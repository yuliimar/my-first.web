<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yuliia Martynovych - Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="app.js" defer></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" type="image/x-icon" href="img/YM.ico" />
  </head>
  <body>
    <header class="header" id="top" role="banner">
      <img
        src="img/perfil.jpeg"
        alt="portrait of Yuliia Martynovych"
        class="profile-photo"
      />

      <div class="language-buttons">
        <button class="lang-btn" onclick="translatePage('en')">EN</button>
        <button class="lang-btn" onclick="translatePage('es')">ES</button>
        <button class="lang-btn" onclick="translatePage('uk')">UK</button>
      </div>

      <h1>Frontend Developer</h1>

      <nav class="header__nav" role="navigation" aria-label="Main menu">
        <ul>
          <li>
            <a
              href="index.html"
              class="nav-link"
              data-translate="about"
              id="nav-about"
              >About me</a
            >
          </li>
          <li>
            <a
              href="projects.html"
              class="nav-link"
              data-translate="projects"
              id="nav-projects"
              >Projects</a
            >
          </li>
          <li>
            <a
              href="contact.html"
              class="nav-link"
              data-translate="contact"
              id="nav-contact"
              >Contact</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="about" id="about">
        <h2 data-translate="about">About me</h2>
        <p data-translate="welcome"></p>
      </section>
    </main>
    <footer class="footer" role="contentinfo">
      <p class="footer__text">
        <span id="current-year"></span> Yuliia Martynovych
      </p>
    </footer>

    <script>
      document.getElementById("current-year").textContent =
        new Date().getFullYear();
    </script>
    <a href="#top" class="scroll__top" aria-label="Back to top">🔝</a>
  </body>
</html>
